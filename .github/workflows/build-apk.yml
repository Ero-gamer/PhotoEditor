name: Build APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew
      
      - name: Clean Previous Builds
        run: ./gradlew clean
      
      - name: Build Photoeditor Library
        run: ./gradlew :photoeditor:build -x test --no-daemon
      
      - name: Build App Debug APK
        run: ./gradlew :app:assembleDebug -x test --no-daemon
      
      - name: List Build Outputs
        if: always()
        run: |
          echo "=== Checking APK Output ==="
          find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo ""
          echo "=== Full app/build structure ==="
          ls -R app/build/outputs/ 2>/dev/null || echo "outputs directory not found"
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoEditor-unsigned-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30
      
      - name: Build Success ✅
        if: success()
        run: echo "APK built successfully!"
