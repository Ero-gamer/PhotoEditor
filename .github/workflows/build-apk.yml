name: Build APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew
      
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon -x test -PossrhUsernameV2=placeholder -PossrhPasswordV2=placeholder
        env:
          GRADLE_OPTS: "-Xmx2g"
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoEditor-unsigned-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Build Complete
        if: success()
        run: echo "APK built successfully"
