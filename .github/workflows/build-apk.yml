name: Build APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew
      
      - name: Build Debug APK
        run: |
          ./gradlew :app:assembleDebug \
            --no-daemon \
            -x test \
            -PossrhUsernameV2=placeholder \
            -PossrhPasswordV2=placeholder
      
      - name: Find APK Location
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f
          echo ""
          echo "=== App build outputs structure ==="
          ls -R app/build/outputs/ 2>/dev/null || echo "outputs directory not found"
          echo ""
          echo "=== Full app/build structure ==="
          find app/build -type d -name apk 2>/dev/null
      
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PhotoEditor-unsigned-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
