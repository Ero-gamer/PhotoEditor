name: Build APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew
      
      - name: Build Unsigned APK
        run: ./gradlew assembleDebug
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: PhotoEditor-unsigned-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Build Status
        if: success()
        run: echo "✅ APK built successfully!"
      
      - name: Build Failed
        if: failure()
        run: echo "❌ Build failed - check logs for details"
