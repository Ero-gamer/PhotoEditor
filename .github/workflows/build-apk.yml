name: Build APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew
      
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
      
      - name: Check APK Output
        run: ls -la app/build/outputs/apk/debug/
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: PhotoEditor-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Build Success
        if: success()
        run: echo "✅ APK built successfully!"
      
      - name: Build Failed
        if: failure()
        run: |
          echo "❌ Build failed"
          find app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
