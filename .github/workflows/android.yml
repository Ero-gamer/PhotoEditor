name: Android CI Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # This creates a "Master Rule" that forces SDK 36 on every module
      - name: Create Global Build Override
        run: |
          cat <<EOF > init.gradle
          allprojects {
              buildscript {
                  dependencies {
                      classpath 'com.android.tools.build:gradle:8.9.1'
                  }
              }
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      android {
                          compileSdk 36
                          defaultConfig {
                              targetSdk 36
                          }
                      }
                  }
              }
          }
          EOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug --init-script init.gradle -x :app:checkDebugAarMetadata

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-editor-debug-apk
          path: app/build/outputs/apk/debug/*.apk
