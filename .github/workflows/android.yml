name: Android Release Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Keeps the 2026 Node.js environment happy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Patch for Release Stability
        run: |
          echo "Removing Maven publishing scripts..."
          find . -name "build.gradle" -exec sed -i '/publish-mavencentral/d' {} +
          
          echo "Forcing stable dependency versions..."
          cat <<EOF > init.gradle
          allprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                      if (details.requested.group == 'androidx.core') {
                          details.useVersion '1.13.0'
                      }
                  }
              }
          }
          EOF

      - name: Build Unsigned Release APK
        # We changed 'assembleDebug' to 'assembleRelease'
        # and 'checkDebugAarMetadata' to 'checkReleaseAarMetadata'
        run: ./gradlew assembleRelease --init-script init.gradle -x :app:checkReleaseAarMetadata --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-editor-release-unsigned
          # Path changed to the release folder
          path: app/build/outputs/apk/release/*.apk
