name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # This step physically changes the files to meet the new requirements
      - name: Patch Build Files for SDK 36
        run: |
          echo "Updating SDK versions..."
          find . -name "build.gradle" -exec sed -i 's/compileSdk 34/compileSdk 36/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdk 34/targetSdk 36/g' {} +
          
          echo "Updating Android Gradle Plugin..."
          find . -name "build.gradle" -exec sed -i 's/com.android.tools.build:gradle:8.5.1/com.android.tools.build:gradle:8.9.1/g' {} +

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-editor-debug-apk
          path: app/build/outputs/apk/debug/*.apk
