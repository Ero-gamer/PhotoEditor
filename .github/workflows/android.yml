name: Android 2026 Release Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: AGP 9 Compatibility Patch
        run: |
          echo "Disabling New DSL to support legacy build tasks..."
          # This is the crucial fix for AGP 9.0+
          echo "android.newDsl=false" >> gradle.properties
          
          echo "Removing Maven publishing scripts..."
          rm -f scripts/publish-mavencentral.gradle
          find . -name "build.gradle" -exec sed -i '/publish-mavencentral/d' {} +
          
          echo "Ensuring SDK 36 Alignment..."
          find . -name "build.gradle" -exec sed -i 's/compileSdk [0-9]*/compileSdk 36/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdk [0-9]*/targetSdk 36/g' {} +

      - name: Build Release APK
        # We use --no-configuration-cache because AGP 9 often conflicts with it 
        # when using the old DSL flag.
        run: ./gradlew assembleRelease --no-configuration-cache -x :app:checkReleaseAarMetadata

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: photo-editor-v9-release
          path: app/build/outputs/apk/release/*.apk
