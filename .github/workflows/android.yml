name: Android CI Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  # Resolves the Node.js 20 deprecation warning for 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Strip Maven Scripts & Force Dependencies
        run: |
          echo "Removing Maven publishing references..."
          # This deletes the lines that try to load the 'publish-mavencentral.gradle' script
          find . -name "build.gradle" -exec sed -i '/publish-mavencentral/d' {} +
          
          echo "Forcing stable dependency versions..."
          # This creates a global rule to stop libraries from auto-updating to SDK 36 versions
          cat <<EOF > init.gradle
          allprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                      if (details.requested.group == 'androidx.core') {
                          details.useVersion '1.13.0'
                      }
                  }
              }
          }
          EOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug --init-script init.gradle -x :app:checkDebugAarMetadata --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-editor-debug-apk
          path: app/build/outputs/apk/debug/*.apk
