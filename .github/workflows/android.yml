name: Android 2026 Release Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  # Required for runners in March 2026 to stay on the modern runtime
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # LATEST: v6 supports Node 24 runtimes natively
      - name: Checkout Code
        uses: actions/checkout@v6

      # LATEST: v5 includes better caching for Gradle 8.9+
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 2026 Compatibility Patch
        run: |
          echo "android.newDsl=false" >> gradle.properties
          # Clean up the Maven scripts that cause the check failures
          rm -f scripts/publish-mavencentral.gradle
          find . -name "build.gradle" -exec sed -i '/publish-mavencentral/d' {} +
          
          # Ensure SDK 36 alignment for your updated dependencies
          find . -name "build.gradle" -exec sed -i 's/compileSdk [0-9]*/compileSdk 36/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdk [0-9]*/targetSdk 36/g' {} +

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-configuration-cache -x :app:checkReleaseAarMetadata

      # LATEST: v7 supports unzipped artifact previews and Node 24
      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: photo-editor-v9-final
          path: app/build/outputs/apk/release/*.apk
